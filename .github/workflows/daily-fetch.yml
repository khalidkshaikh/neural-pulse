name: Daily AI News Fetch

on:
  # Run every day at 7:00 AM UTC (3am ET / midnight PT)
  schedule:
    - cron: '0 7 * * *'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write  # needed to commit updated data files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest AI news
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Check if data changed
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.name  "NeuralPulse Bot"
          git config --local user.email "bot@neuralpulse.app"
          git add data/
          git commit -m "chore: daily news fetch $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      # Pushing updated data/  triggers the deploy.yml workflow automatically

      - name: Summary
        run: |
          echo "### Fetch complete" >> $GITHUB_STEP_SUMMARY
          echo "- Articles: $(cat data/articles.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d))')" >> $GITHUB_STEP_SUMMARY
          echo "- SAP updates: $(cat data/sap-updates.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d))')" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY
