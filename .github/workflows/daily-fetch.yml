name: Daily AI News Fetch

on:
  # Run every day at 7:00 AM UTC (3am ET / midnight PT)
  schedule:
    - cron: '0 7 * * *'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: write  # commit updated data files
  pages: write     # deploy to GitHub Pages
  id-token: write  # OIDC token for Pages

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest AI news
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Check if data changed
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.name  "NeuralPulse Bot"
          git config --local user.email "bot@neuralpulse.app"
          git add data/
          git commit -m "chore: daily news fetch $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      # Build & deploy only when articles actually changed
      - name: Build static export
        if: steps.changes.outputs.changed == 'true'
        env:
          NEXT_PUBLIC_GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "### ✅ Fetch + Deploy complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ No new articles — skipped deployment" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Articles: $(cat data/articles.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d))')" >> $GITHUB_STEP_SUMMARY
          echo "- SAP updates: $(cat data/sap-updates.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d))')" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY
